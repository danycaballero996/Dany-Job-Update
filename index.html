<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dany's Ultimate Fate...</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Cinzel:wght=600;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }

        /* Cinematic & Horror Fonts */
        .cinematic-title {
            font-family: 'Cinzel', serif;
            letter-spacing: 0.1em;
        }

        .horror-font {
            font-family: 'Creepster', cursive;
            letter-spacing: 0.05em;
        }

        /* Smooth background transitions */
        #main-container {
            transition: background-color 0.4s ease-in-out, box-shadow 0.4s ease-in-out;
        }

        /* Dark Vignette Effect */
        .vignette {
            box-shadow: inset 0 0 150px rgba(0,0,0,0.95);
        }

        /* Fade transitions */
        .fade-transition {
            transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out;
        }

        .fade-out {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
        }

        .fade-in {
            opacity: 1;
            transform: scale(1);
        }

        /* Subtle shake/jitter suspense effect */
        @keyframes jitter {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-2px, 2px) rotate(-1deg); }
            20% { transform: translate(2px, -2px) rotate(1deg); }
            30% { transform: translate(-1px, -1px); }
            40% { transform: translate(2px, 1px); }
            50% { transform: translate(-2px, -1px) rotate(-1deg); }
            60% { transform: translate(1px, 2px); }
            70% { transform: translate(-2px, 1px); }
            80% { transform: translate(2px, -2px) rotate(1deg); }
            90% { transform: translate(-1px, 2px); }
            100% { transform: translate(0, 0); }
        }

        .suspense-jitter {
            animation: jitter 0.15s infinite;
        }

        @keyframes violent-shake {
            0%, 100% { transform: translate(0, 0) scale(1); }
            20% { transform: translate(-8px, 5px) rotate(-2deg) scale(1.02); }
            40% { transform: translate(8px, -5px) rotate(2deg) scale(0.98); }
            60% { transform: translate(-5px, -3px) scale(1.05); }
            80% { transform: translate(6px, 4px) rotate(-1deg) scale(0.95); }
        }

        .screen-shake {
            animation: violent-shake 0.3s ease-in-out;
        }

        /* Heartbeat pulsing button */
        @keyframes heartbeat {
            0% { transform: scale(1); box-shadow: 0 0 10px rgba(185, 28, 28, 0.4); }
            15% { transform: scale(1.06); box-shadow: 0 0 25px rgba(185, 28, 28, 0.7); }
            30% { transform: scale(1); box-shadow: 0 0 10px rgba(185, 28, 28, 0.4); }
            45% { transform: scale(1.06); box-shadow: 0 0 25px rgba(185, 28, 28, 0.7); }
            100% { transform: scale(1); box-shadow: 0 0 10px rgba(185, 28, 28, 0.4); }
        }
        .btn-heartbeat {
            animation: heartbeat 1.3s infinite;
        }

        /* Floating elements for failure state */
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.5) rotate(360deg); opacity: 0; }
        }

        .particle {
            position: absolute;
            bottom: -10%;
            animation: floatUp linear infinite;
            font-size: 2rem;
            user-select: none;
            z-index: 0;
        }
    </style>
</head>
<body class="bg-black text-white">

    <!-- 0. Interaction Gate (To cleanly unlock audio API on mobile/web browsers) -->
    <div id="intro-screen" class="absolute inset-0 z-50 flex items-center justify-center bg-black cursor-pointer fade-transition">
        <p class="text-red-700 font-bold tracking-widest uppercase text-sm sm:text-base animate-pulse">Tap anywhere to discover the fate...</p>
    </div>

    <!-- Main Container -->
    <div id="main-container" class="relative min-h-screen w-full flex items-center justify-center bg-zinc-950 vignette p-6 overflow-hidden">
        
        <!-- Particles Container -->
        <div id="particles-container" class="absolute inset-0 pointer-events-none hidden"></div>

        <!-- 1. Suspenseful Landing Card -->
        <div id="landing-card" class="fade-transition fade-out z-10 max-w-md w-full bg-black/80 backdrop-blur-md rounded-2xl shadow-[0_0_80px_rgba(185,28,28,0.15)] p-8 text-center border border-red-950/40">
            <div class="w-16 h-16 bg-red-950/20 border border-red-900/40 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl shadow-[0_0_20px_rgba(185,28,28,0.2)]">
                💀
            </div>
            
            <h1 class="horror-font text-5xl font-extrabold mb-4 text-red-600 suspense-jitter">DANY'S FATE</h1>
            
            <div class="h-[2px] w-36 bg-gradient-to-r from-transparent via-red-700 to-transparent mx-auto mb-6"></div>

            <p class="text-zinc-400 mb-8 leading-relaxed text-sm sm:text-base">
                The corporate overlords have decided.<br>
                Open the envelope to reveal Dany's career fate. <br>
                <span class="text-red-900 text-xs uppercase tracking-widest mt-4 block font-semibold">Blue = Hired &nbsp;|&nbsp; Green = Didn't get it</span>
            </p>

            <button id="reveal-btn" class="btn-heartbeat w-full bg-red-700 hover:bg-red-800 text-white font-bold py-4 px-8 rounded-xl transition-all duration-300 text-lg uppercase tracking-widest border border-red-500">
                Reveal the Fate
            </button>
        </div>

        <!-- 2. Suspense Countdown Screen -->
        <div id="countdown-screen" class="absolute inset-0 flex flex-col items-center justify-center text-center z-10 hidden opacity-0 transition-opacity duration-300">
            <h2 class="text-red-800 text-lg sm:text-xl uppercase tracking-[0.3em] font-bold mb-2">REVEALING IN</h2>
            <div id="countdown-number" class="horror-font text-[10rem] sm:text-[14rem] text-red-600 font-extrabold drop-shadow-[0_0_40px_rgba(220,38,38,0.6)] leading-none select-none">
                5
            </div>
        </div>

        <!-- 3. Final Reveal Screen -->
        <div id="reveal-content" class="fade-transition fade-out absolute inset-0 flex flex-col items-center justify-center p-6 text-center z-10 hidden">
            <h1 id="reveal-text" class="text-5xl sm:text-7xl font-extrabold text-white drop-shadow-2xl mb-4 tracking-tight">
                <!-- Injected via JavaScript -->
            </h1>
        </div>

    </div>

    <script>
        // ==========================================
        // 🚨 EDIT THIS VARIABLE TO CHANGE THE RESULT
        // ==========================================
        const GOT_THE_JOB = true; 
        // ==========================================


        // --- DOM Elements ---
        const introScreen = document.getElementById('intro-screen');
        const mainContainer = document.getElementById('main-container');
        const landingCard = document.getElementById('landing-card');
        const countdownScreen = document.getElementById('countdown-screen');
        const countdownNumber = document.getElementById('countdown-number');
        const revealContent = document.getElementById('reveal-content');
        const revealText = document.getElementById('reveal-text');
        const revealBtn = document.getElementById('reveal-btn');
        const particlesContainer = document.getElementById('particles-container');

        // --- Audio Setup ---
        let audioCtx;
        let ambientOsc, ambientGain, lfo, heartbeatInterval;

        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            // Warm up speech synthesizer voices
            if ('speechSynthesis' in window) {
                window.speechSynthesis.getVoices();
            }
        }

        // --- Continuous Ambient Thriller Sound ---
        function startSuspenseAudio() {
            initAudio();

            // Heavy dark rumbling sub-bass drone
            ambientOsc = audioCtx.createOscillator();
            ambientOsc.type = 'sawtooth';
            ambientOsc.frequency.value = 45; 

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 90; 

            ambientGain = audioCtx.createGain();
            ambientGain.gain.value = 0.6;

            // Slow volume swell / modulation LFO
            lfo = audioCtx.createOscillator();
            lfo.type = 'sine';
            lfo.frequency.value = 0.25; 
            const lfoGain = audioCtx.createGain();
            lfoGain.gain.value = 0.35;
            
            lfo.connect(lfoGain);
            lfoGain.connect(ambientGain.gain);

            ambientOsc.connect(filter);
            filter.connect(ambientGain);
            ambientGain.connect(audioCtx.destination);

            ambientOsc.start();
            lfo.start();

            // Heartbeat ticks
            function triggerBeat(time) {
                const beatOsc = audioCtx.createOscillator();
                const beatGain = audioCtx.createGain();
                
                beatOsc.type = 'sine';
                beatOsc.frequency.setValueAtTime(100, time);
                beatOsc.frequency.exponentialRampToValueAtTime(30, time + 0.15);
                
                beatGain.gain.setValueAtTime(0, time);
                beatGain.gain.linearRampToValueAtTime(0.8, time + 0.02);
                beatGain.gain.exponentialRampToValueAtTime(0.001, time + 0.3);

                beatOsc.connect(beatGain);
                beatGain.connect(audioCtx.destination);

                beatOsc.start(time);
                beatOsc.stop(time + 0.3);
            }

            function playHeartbeat() {
                if(audioCtx && audioCtx.state !== 'suspended') {
                    const now = audioCtx.currentTime;
                    triggerBeat(now);           // Lub
                    triggerBeat(now + 0.22);    // Dub
                }
            }

            heartbeatInterval = setInterval(playHeartbeat, 1300); 
        }

        function stopSuspenseAudio() {
            if (ambientGain) {
                ambientGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
                setTimeout(() => {
                    if(ambientOsc) ambientOsc.stop();
                    if(lfo) lfo.stop();
                }, 500);
            }
            if (heartbeatInterval) clearInterval(heartbeatInterval);
        }

        // --- Synthesized Horror Movie Screams ---
        function playHorrorScream(secondsRemaining) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const intensity = 6 - secondsRemaining; 

            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const filter = audioCtx.createBiquadFilter();
            const screamGain = audioCtx.createGain();
            
            const baseFreq = 700 + (intensity * 150); 
            
            osc1.type = 'sawtooth';
            osc1.frequency.setValueAtTime(baseFreq, now);
            osc1.frequency.exponentialRampToValueAtTime(baseFreq * 2, now + 0.9);
            
            osc2.type = 'square';
            osc2.frequency.setValueAtTime(baseFreq * 1.04, now);
            osc2.frequency.exponentialRampToValueAtTime(baseFreq * 0.7, now + 0.9);
            
            const vibratoLFO = audioCtx.createOscillator();
            const vibratoGain = audioCtx.createGain();
            vibratoLFO.type = 'sine';
            vibratoLFO.frequency.value = 55; 
            vibratoGain.gain.value = 120 + (intensity * 20); 
            
            vibratoLFO.connect(vibratoGain);
            vibratoGain.connect(osc1.frequency);
            vibratoGain.connect(osc2.frequency);
            
            filter.type = 'bandpass';
            filter.frequency.setValueAtTime(1400, now);
            filter.Q.value = 1.2;
            
            screamGain.gain.setValueAtTime(0, now);
            const volume = 0.08 + (intensity * 0.03); 
            screamGain.gain.linearRampToValueAtTime(volume, now + 0.15);
            screamGain.gain.exponentialRampToValueAtTime(0.001, now + 0.9);
            
            osc1.connect(filter);
            osc2.connect(filter);
            filter.connect(screamGain);
            screamGain.connect(audioCtx.destination);
            
            osc1.start(now);
            osc2.start(now);
            vibratoLFO.start(now);
            
            osc1.stop(now + 1.0);
            osc2.stop(now + 1.0);
            vibratoLFO.stop(now + 1.0);

            // Sub bass impact tick
            const impactOsc = audioCtx.createOscillator();
            const impactGain = audioCtx.createGain();
            impactOsc.type = 'sine';
            impactOsc.frequency.setValueAtTime(90, now);
            impactOsc.frequency.exponentialRampToValueAtTime(20, now + 0.5);
            impactGain.gain.setValueAtTime(0.5, now);
            impactGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
            impactOsc.connect(impactGain);
            impactGain.connect(audioCtx.destination);
            impactOsc.start(now);
            impactOsc.stop(now + 0.5);
        }

        // --- Vinyl Record Scratch Effect ---
        function playRecordScratch() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.exponentialRampToValueAtTime(40, now + 0.4);
            
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.linearRampToValueAtTime(0.001, now + 0.4);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(now);
            osc.stop(now + 0.4);
        }

        // --- Speech Synthesis + Chime Scales ---
        function speakWord(word, pitch = 1, rate = 1) {
            if ('speechSynthesis' in window) {
                const voices = window.speechSynthesis.getVoices();
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.pitch = pitch;
                utterance.rate = rate;
                if (voices && voices.length > 0) {
                     utterance.voice = voices.find(v => v.name.includes('Female')) || voices[0];
                }
                window.speechSynthesis.speak(utterance);
            }
        }

        function playSuccessSound() {
            speakWord("Yayyy!", 1.5, 1.1); 
            // Upward bright major scale (C Major arpeggio/scale)
            const notes = [523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 987.77, 1046.50]; 
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + (i * 0.1));
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                const startTime = audioCtx.currentTime + (i * 0.1);
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(0.25, startTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.4);
                
                osc.start(startTime);
                osc.stop(startTime + 0.4);
            });
        }

        function playFailureSound() {
            speakWord("Boooo", 0.5, 0.8); 
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(280, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 1.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.25, audioCtx.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 1.5);
        }

        // --- Visual Animations ---
        function triggerConfetti() {
            const duration = 4000;
            const end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 7, angle: 60, spread: 65, origin: { x: 0 }, colors: ['#ffffff', '#60A5FA', '#2563EB', '#3B82F6'] });
                confetti({ particleCount: 7, angle: 120, spread: 65, origin: { x: 1 }, colors: ['#ffffff', '#60A5FA', '#2563EB', '#3B82F6'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function triggerFloatingHearts() {
            particlesContainer.classList.remove('hidden');
            const items = ['💚', '✨', '🤍', '🌱'];
            for (let i = 0; i < 35; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.classList.add('particle');
                    particle.innerText = items[Math.floor(Math.random() * items.length)];
                    particle.style.left = Math.random() * 100 + 'vw';
                    particle.style.animationDuration = (Math.random() * 3 + 4) + 's';
                    particlesContainer.appendChild(particle);
                    setTimeout(() => particle.remove(), 7000);
                }, i * 180); 
            }
        }

        // --- Interactive Controller State ---

        // 1. Trigger initial gate screen
        introScreen.addEventListener('click', () => {
            introScreen.classList.add('fade-out');
            setTimeout(() => {
                introScreen.classList.add('hidden');
                landingCard.classList.remove('hidden');
                landingCard.classList.remove('fade-out');
                landingCard.classList.add('fade-in');
            }, 800);

            startSuspenseAudio();
        });

        // 2. Click button to trigger timer countdown sequence
        revealBtn.addEventListener('click', () => {
            clearInterval(heartbeatInterval);

            landingCard.classList.remove('fade-in');
            landingCard.classList.add('fade-out');
            
            setTimeout(() => {
                landingCard.classList.add('hidden');
                
                countdownScreen.classList.remove('hidden');
                requestAnimationFrame(() => {
                    countdownScreen.classList.remove('opacity-0');
                });
                
                startCountdownLoop();
            }, 800);
        });

        // Countdown State Loop
        function startCountdownLoop() {
            let secondsLeft = 5;
            
            const timer = setInterval(() => {
                if (secondsLeft > 0) {
                    countdownNumber.innerText = secondsLeft;
                    playHorrorScream(secondsLeft);
                    
                    mainContainer.classList.add('bg-red-950/40', 'screen-shake');
                    countdownNumber.classList.add('suspense-jitter');
                    
                    setTimeout(() => {
                        mainContainer.classList.remove('bg-red-950/40', 'screen-shake');
                        countdownNumber.classList.remove('suspense-jitter');
                    }, 500);

                    secondsLeft--;
                } else {
                    clearInterval(timer);
                    triggerFinalReveal();
                }
            }, 1200); 
        }

        // Final Reveal Screen State
        function triggerFinalReveal() {
            stopSuspenseAudio();

            countdownScreen.classList.add('opacity-0');
            
            setTimeout(() => {
                countdownScreen.classList.add('hidden');
                revealContent.classList.remove('hidden');
                
                requestAnimationFrame(() => {
                    revealContent.classList.remove('fade-out');
                    revealContent.classList.add('fade-in');
                });
            }, 300);

            if (GOT_THE_JOB) {
                // FAKEOUT: Start with fake green sad screen
                mainContainer.classList.remove('bg-zinc-950', 'vignette');
                mainContainer.classList.add('bg-green-600'); 
                
                revealText.className = "text-5xl sm:text-7xl font-extrabold text-white drop-shadow-md mb-4 tracking-tight cinematic-title";
                revealText.innerText = "I didn’t get the job :’(";
                
                // Floating sad emojis
                triggerFloatingHearts();
                
                setTimeout(() => {
                    playFailureSound(); // "Boooo" sound plays
                }, 400);

                // --- THE PLOT TWIST: SIKE! ---
                setTimeout(() => {
                    // Instantly delete sad particles
                    particlesContainer.innerHTML = ''; 
                    
                    // Scratch sound
                    playRecordScratch();

                    // Short pause after scratch before true celebration
                    setTimeout(() => {
                        // Switch background to blue
                        mainContainer.classList.remove('bg-green-600');
                        mainContainer.classList.add('bg-blue-600');
                        
                        // Set the victory text
                        revealText.innerText = "SIKE I DID! 🎉";
                        
                        // Play joyful sounds and confetti
                        playSuccessSound();
                        triggerConfetti();
                    }, 400);

                }, 3500); // 3.5 seconds of sadness before the fakeout happens!

            } else {
                // Real Defeat (No sike trick)
                mainContainer.classList.remove('bg-zinc-950', 'vignette');
                mainContainer.classList.add('bg-green-600');
                
                revealText.className = "text-5xl sm:text-7xl font-extrabold text-white drop-shadow-md mb-4 tracking-tight cinematic-title";
                revealText.innerText = "I didn’t get the job :’(";
                
                setTimeout(() => {
                    playFailureSound();
                    triggerFloatingHearts();
                }, 400);
            }
        }
    </script>
</body>
</html>
